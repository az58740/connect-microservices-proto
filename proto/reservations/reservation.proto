enum FacilityType {
  Facility_BOOKABLE = 0;         // قابل رزرو (مثلاً آرایشگاه، پزشک)
  Facility_PURCHASABLE = 1;      // قابل خرید (مثلاً فروشگاه)
  Facility_HYBRID = 2;           // ترکیبی
  Facility_ACCOMMODATION = 3;    // فسیلیتی اقامتی مثل هتل یا هاستل
  Facility_NOT_BOOKABLE = 4; //  غیر قابل رزروNot bookable (e.g., store, exhibition hall)
}
// نوع‌های استاندارد اتاق | Standard room type codes
enum RoomTypeCode {
  ROOM_TYPE_UNSPECIFIED = 0; // نامشخص | Unspecified
  SINGLE = 1;                // یک‌تخته | Single
  DOUBLE = 2;                // دوتخته | Double
  TWIN = 3;                  // دو تخت جدا | Twin
  SUITE = 4;                 // سوئیت | Suite
  FAMILY = 5;                // خانوادگی | Family
  KING = 6;                  // کینگ | King
  QUEEN = 7;                 // کوئین | Queen
}
enum Status {
  ACTIVE = 0;     // پیش‌فرض: فعال
  INACTIVE = 1;   // غیرفعال
}
// نوع مشتری | Customer type
enum CustomerType {
  CUSTOMER_REGULAR = 0;     // مشتری عادی | Regular customer
  CUSTOMER_VIP = 1;         // مشتری ویژه | VIP customer
  CUSTOMER_WALK_IN = 2;     // مشتری حضوری (بدون حساب کاربری) | Walk-in customer
  CUSTOMER_STAFF_REL = 3;   // وابسته کارمند یا اعضای سالن | Staff-relative customer
  CUSTOMER_CORPORATE = 4;   // مشتری سازمانی یا شرکتی | Corporate customer
}

// ========== ENTITIES ==========
// رشته قابل ترجمه در چند زبان | Translatable string with multiple languages
message LocalizedString {
  string fa = 1;  // فارسی
  string en = 2;  // انگلیسی
  string ar = 3;  // عربی
}
// Pagination options .
message Pagination {
    int32 page = 1;                     // Page number (starting from 1).
    int32 page_size = 2;                // Number of items to return per page.
    optional string sort_by = 3;        // Field by which to sort the results (e.g., "username").
    optional bool sort_descending = 4;  // Whether to sort the results in descending order.
}
// فسیلیتی یا مکان — مانند مطب، آرایشگاه، هتل، باشگاه
// Facility such as a clinic, salon, hotel, or gym
message Facility {
  string id = 1;                    // شناسه منحصر به فرد
  LocalizedString name = 2;                  // نام ساختار (مثلاً "کلینیک دکتر محمدی")
  FacilityTitle title = 3;          // نوع ساختاری (کلینیک، سالن، هتل و ...)
  FacilityType type = 4;            // کاربرد (رزرو، خرید، ترکیبی)
  FacilityGroup group = 5;          // گروه‌بندی موضوعی
  Status status = 6;                // وضعیت: فعال / غیرفعال
}
// سرویس یا خدمت قابل ارائه در فسیلیتی
// Service offered in a facility
message Service {
  string id = 1; // شناسه یکتا | Unique service ID
  string facility_id = 2; // شناسه فسیلیتی که این سرویس به آن تعلق دارد | Associated facility ID
  LocalizedString name = 3; // نام سرویس مانند "کوتاهی مو" یا "ویزیت عمومی" | Service name
  optional  LocalizedString description = 4; // توضیحات | Description 
  bool is_available = 5;
  optional int32 default_duration_minutes = 6; // مدت پیش‌فرض | Default duration
  optional google.type.Money default_price = 7; // قیمت پیش‌فرض | Default price
}
// تصویر مرتبط با یک فسیلیتی مانند عکس اتاق یا نمای بیرونی
// Image related to a facility, like room photo or exterior view
message FacilityImage {
  string id = 1;                // شناسه یکتا | Unique image ID
  string facility_id = 2;       // شناسه فسیلیتی | Related Facility ID
  string url = 3;               // مسیر یا لینک فایل تصویر | URL or file path to the image
  LocalizedString title = 4;             // عنوان اختیاری | Optional image title
  LocalizedString description = 5;       // توضیح تصویر | Optional image description
  Status status = 6;                // وضعیت: فعال / غیرفعال
}
// نگاشت بین سرویس و ارائه‌دهنده خاص
// Mapping of service to a specific provider
message ProviderService {
  string id = 1;
  LocalizedString name = 2; // نام سرویس مانند "کوتاهی مو" یا "ویزیت عمومی" | Service name
  optional  LocalizedString description = 3; // توضیحات | Description 
  string facility_id = 4;
  LocalizedString facility_name=5;
  FacilityType facility_type=6;
  string service_id =7;
  string provider_user_id = 8; // شناسه کاربر ارائه‌دهنده (مثل پزشک یا آرایشگر)
  bool is_available = 9; // آیا ارائه می‌شود یا نه
  optional google.type.Money price = 10;          // قیمت اختصاصی این provider
  optional int32 duration_minutes = 11;           // مدت اختصاصی این provider
}
// برنامه‌ زمانی تکرارشونده‌ی سرویس‌دهنده در یک روز خاص  
// Weekly recurring availability for provider
message WeeklySchedule {
  string id = 1;
  string provider_user_id = 2;
  WeekDay day = 3;                     // روز هفته | Day of the week (e.g. Saturday)
  google.protobuf.Timestamp start_time = 4;              // ساعت شروع (HH:mm) مثل "09:00"
  google.protobuf.Timestamp end_time = 5;                // ساعت پایان (HH:mm) مثل "17:00"
  string facility_id = 6;             // مکان مرتبط | Facility ID
  string employer_id = 7;     // سرویس خاص، اختیاری | Optional service ID
  Status status = 8;                  // وضعیت فعال یا غیرفعال
}

// بازه‌ زمانی رزروپذیر (تولیدشده یا دستی)  
// Exact time slot for reservation
message TimeSlot {
  string id = 1;
  string provider_user_id = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
  OwnerType owner_type = 5;            // فردی یا اشتراکی
  bool is_reserved = 6;                // آیا رزرو شده یا نه
  optional string weekly_schedule_id = 7; // منبع ساخت (در صورت تولید خودکار)
  string facility_id = 8;
  optional string employer_id = 9;
  SlotSource source = 10;
  Status status = 11; // فعال/غیرفعال (مثلاً کنسل شده یا غیرفعال شده)
  WeekDay day = 12;                     // روز هفته | Day of the week (e.g. Saturday)
  int32 capacity = 13; // ظرفیت کل
  int32 reserved_count = 14; // تعداد رزروهای انجام شده
}
// رزرو ثبت‌شده توسط کاربر
// سرویس انتخاب‌شده در رزرو
message ReservationServiceItem {
  string service_id = 1;     // شناسه سرویس
  string reservation_id=2;   // شناسه رزرواسیون
  LocalizedString service_name = 3; // نام سرویس مانند "کوتاهی مو" یا "ویزیت عمومی" | Service name
  google.type.Money booked_price = 4; // مبلغ سرویس در زمان رزرو
  int32 quantity = 5;        // تعداد
}

// رزرو کامل
message Reservation {
  string id = 1;
  string user_id = 2;
  string provider_user_id = 3;
  string OwnerUserId=4;  
  string linkedUserId=5;  


  string facility_id = 6;
  string time_slot_id = 7;

  repeated ReservationServiceItem services = 8;

  ReservationStatus status = 9;
  PaymentStatus payment_status = 10;
  ReservationSource source = 11;
  string notes = 12;

  // نمایش
  string user_name = 13;
  string provider_user_name = 14;
  string owner_user_name = 15;
  LocalizedString facility_name = 16;
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
  

  google.type.Money total_amount = 19;

  // --- جدید: شروع و پایان رزرو ---
  google.protobuf.Timestamp start_time = 20; // زمان شروع رزرو
  google.protobuf.Timestamp end_time = 21;   // زمان پایان رزرو
}

message Customer {
   string Id =1;
    string OwnerUserId=2;      // صاحب مشتری = سالن
 optional string   ProviderUserId =3;  // عضو سالن که مشتری ازش سرویس گرفته
  optional string LinkedUserId =4;     // اگر مشتری خودش حساب دارد
  optional string FacilityId=5;
   string  Name =6;            
   string Phone =7;          
   optional string  Email =8;          
 Status status =9;
 CustomerType type=10;
 //just for display
   optional string  OwnerName =11;            
   optional string   ProviderName =12;            
optional string   LinkedUserName =13;  
google.protobuf.Timestamp CreatedAt =14; 
}
message CustomerFilter {
  optional string Id =1;
optional string Name=2;
 optional   string OwnerUserId=3;      // صاحب مشتری = سالن
optional  string   ProviderUserId =4;
optional   string   FacilityId =5;
 optional    string Phone =6; 
 optional string status =7; 
 optional  string type=8;
 optional  string LinkedUserId =9;  
}
message CreateCustomerRequest{
  Customer customer=1;
}
message CreateCustomerResponse{
  string customerId=1;
  string message=2;
}
message UpdateCustomerRequest{
  Customer customer=1;
}
message UpdateCustomerResponse{
  Customer customer=1;
  string message=2;
}
message ListCustomerRequest{
  CustomerFilter filter=1;
  Pagination pagination=2;
}
message ListCustomerResponse{
  repeated Customer customers=1;
    string next_page_token = 2;  // Token for the next page of results (optional).
    int32 total_pages = 3;       // Total number of users in the system.
}



// بازه‌های عدم دسترسی ارائه‌دهنده (برای کل روز یا ساعاتی خاص)
// Periods when the provider is not available (full day or specific hours)
message ProviderUnavailability {
  string id = 1;
  string provider_user_id = 2;                // شناسه ارائه‌دهنده | Provider user ID
  google.protobuf.Timestamp date = 3;         // تاریخ غیبت | Specific date (e.g. 2025-07-15)
  optional string start_time = 4;             // ساعت شروع (مثلاً "09:00") | Optional start time
  optional string end_time = 5;               // ساعت پایان (مثلاً "12:00") | Optional end time
  optional string reason = 6;                 // دلیل اختیاری (مثلاً مرخصی، سفر و ...) | Optional reason
  bool full_day = 7;                          // آیا کل روز غیرفعال است؟ | Is it a full-day off?
  Status status = 8;                          // فعال / غیرفعال
}

message RoomAvailability {
  string id = 1;
  string service_id = 2;
  google.protobuf.Timestamp date = 3; // تاریخ شب
  bool is_reserved = 4;
}
message ServiceUnavailability {
  string id = 1;
  string service_id = 2; // اتاق خاص
  string provider_user_id = 3; // شناسه کاربر ارائه‌دهنده (مثل پزشک یا آرایشگر)
  google.protobuf.Timestamp from = 4;
  google.protobuf.Timestamp to = 5;
  string reason = 6;
}
// اطلاعات نوع اتاق در هتل | Hotel room type definition
message RoomType {
  string id = 1;
  string facility_id = 2;                    // شناسه هتل | Hotel/facility ID
  RoomTypeCode type_code = 3;                // کد نوع اتاق استاندارد | Standard room type code
  LocalizedString custom_name = 4;           // نام سفارشی توسط ادمین | Custom name (optional)
  LocalizedString description = 5;           // توضیحات | Description

  int32 capacity = 6;                        // ظرفیت | Max guest capacity
  int32 bed_count = 7;                       // تعداد تخت | Bed count
  string bed_type = 8;                       // نوع تخت | Bed type (Single, Double, King...)

  bool has_private_bathroom = 9;             // حمام اختصاصی | Private bathroom
  bool has_air_conditioning = 10;            // تهویه مطبوع | Air conditioning
  bool has_tv = 11;                          // تلویزیون | TV
  bool has_wifi = 12;                        // وای‌فای | WiFi
  bool has_balcony = 13;                     // بالکن | Balcony
  bool is_smoking_allowed = 14;              // مجاز بودن سیگار | Smoking allowed

  optional google.type.Money base_price = 15;         // قیمت پایه | Base price
  Status status = 16;                        // وضعیت: فعال/غیرفعال | Status
}
// اطلاعات یک اتاق واقعی در هتل | Physical room information in a hotel
message Room {
  string id = 1;
  string facility_id = 2;              // شناسه هتل | Hotel/facility ID
  string room_type_id = 3;             // شناسه نوع اتاق | Associated RoomType ID
  string room_number = 4;              // شماره یا نام اتاق | Room number or label (e.g., 101, A1)

  repeated RoomImage images = 5;       // تصاویر اتاق | Room images
  Status status = 6;                   // وضعیت: فعال، غیرفعال، در حال تعمیر | Status (Available, Maintenance, etc.)
}
// تصویرهای اتاق | Room images
message RoomImage {
  string id = 1;                      // شناسه یکتا | Unique image ID
  string room_id = 2;                 // شناسه اتاق | Room ID this image belongs to
  string url = 3;                     // لینک یا مسیر فایل تصویر | Image URL or file path
  LocalizedString title = 4;         // عنوان تصویر (اختیاری) | Optional image title
  LocalizedString description = 5;   // توضیح تصویر (اختیاری) | Optional image description
  Status status = 6;                 // وضعیت: فعال / غیرفعال | Active / Inactive
}


// ========== REQUEST / RESPONSE MESSAGES ==========

// ایجاد فسیلیتی | Create a facility
message CreateFacilityRequest {
  LocalizedString name = 1;
  FacilityTitle title = 2;
  FacilityType type = 3;
  FacilityGroup group = 4;
  Status status = 5;
}

message CreateFacilityResponse {
  string id = 1;       // شناسه فسیلیتی ایجاد شده | Created facility ID
  string message = 2;  // پیام موفقیت یا خطا | Success or error message
  Facility facility = 3;

}

message UpdateFacilityRequest {
  string facility_id = 1;

  // می‌تونیم یک فیلد partial باشه و فقط فیلدهایی که کاربر می‌خواد بروز کنه را بفرسته
  LocalizedString name = 2;
  FacilityTitle title = 3;
  FacilityType type = 4;
  FacilityGroup group = 5;
  Status status = 6;
}

message UpdateFacilityResponse {
  Facility facility = 1;
  string message = 2;
}
message ListFacilitiesRequest {
 FaclityFilter filter=1;
}
message FaclityFilter {
  optional string facility_id = 1;
  optional FacilityGroup group = 2;
  optional FacilityType type = 3;
  optional FacilityTitle title = 4;
  optional string facility_name = 5;
   optional FacilityType oppositetype = 6;
}
message ListFacilitiesResponse {
  repeated Facility facilities = 1;  // لیست فسیلیتی‌ها | List of facilities
}

// ایجاد سرویس | Create a service
message CreateServiceRequest {
  string facility_id = 1;
  LocalizedString name = 2;
  optional LocalizedString description = 3;
  bool is_available = 4;
  optional int32 default_duration_minutes = 5;
  optional google.type.Money default_price = 6;
}
message CreateServiceResponse {
  Service service = 1;
  string message = 2;
}
// ویرایش سرویس | Update a service
message UpdateServiceRequest {
  string service_id = 1;
  optional  string facility_id = 2;
  optional LocalizedString name = 3;
  optional LocalizedString description = 4;
  optional bool is_available = 5;
  optional int32 default_duration_minutes = 6;
  optional google.type.Money default_price = 7;
}
message UpdateServiceResponse {
  Service service = 1;
  string message=2;
}
// لیست سرویس ها| List all services for a facility
message ListServicesRequest {
  ListServiceFilter filter = 1;
}
message ListServiceFilter {
   optional string service_id = 1;
   optional string facility_id = 2;
   optional  bool is_available = 3;
}
message ListServicesResponse {
  repeated Service services = 1;
}
// اختصاص سرویس به ارائه‌دهنده | Assign service to provider
message AssignServiceToProviderRequest {
   repeated ProviderService services = 1; 
}
// پاسخ برای تخصیص 
message AssignServiceToProviderResponse {
  bool success = 1;
  string message = 2;
}
// درخواست برای حذف سرویس
message RemoveServiceFromProviderRequest {
   repeated ProviderService services = 1;
}
// پاسخ  حذف سرویس
message RemoveServiceFromProviderResponse {
  bool success = 1;
  string message = 2;
}
// ویرایش سرویس | Update a service
message UpdateProviderServiceRequest {
  string id = 1;
  optional bool is_available = 2;
  optional int32 duration_minutes = 3;
  optional google.type.Money price = 4;
    optional LocalizedString name = 5;
  optional LocalizedString description = 6;
   optional  string facility_id = 7;
}
message UpdateProviderServiceResponse {
  ProviderService service = 1;
  string message=2;
}
// درخواست برای دریافت لیست سرویس‌های یک ارائه‌دهنده
message GetProviderServicesListRequest {
ProviderServiceFilter filter=1;
}
message ProviderServiceFilter{
  string provider_user_id = 1;
  optional string facility_id=2;
  optional string  service_id=3;
  optional string id=4;
}
// پاسخ برای لیست سرویس‌های یک ارائه‌دهنده
message GetProviderServicesListResponse {
  repeated ProviderService services = 1;
}

// ایجاد برنامه هفتگی | Create weekly schedule
message CreateWeeklyScheduleRequest {
 repeated WeeklySchedule schedule = 1; // برنامه زمانی | Weekly schedule
}
message CreateWeeklyScheduleResponse {
 bool success = 1;
 string message = 2;
}
message WeeklyScheduleFilter{
  optional string provider_user_id = 1;
  optional string facility_id=2;
  optional string  employer_id=3;
  optional string id=4;
  optional google.protobuf.Timestamp start_time = 5;
  optional google.protobuf.Timestamp end_time = 6;
  optional Status status = 7;    
}
message GetWeeklyScheduleListRequest {
WeeklyScheduleFilter filter=1;
}
message GetWeeklyScheduleListResponse {
  repeated WeeklySchedule weeklyschedules = 1;
}
message UpdateWeeklyScheduleRequest {
  string id = 1;
  string provider_user_id = 2;
  WeekDay day = 3;                     // روز هفته | Day of the week (e.g. Saturday)
  google.protobuf.Timestamp start_time = 4;              // ساعت شروع (HH:mm) مثل "09:00"
  google.protobuf.Timestamp end_time = 5;                // ساعت پایان (HH:mm) مثل "17:00"
  string facility_id = 6;             // مکان مرتبط | Facility ID
  optional string employer_id = 7;     // سرویس خاص، اختیاری | Optional service ID
  Status status = 8;                  // وضعیت فعال یا غیرفعال
}
message UpdateWeeklyScheduleResponse {
  WeeklySchedule weeklySchedule = 1;
  string message=2;
}
message RemoveWeeklyScheduleRequest {
  string id = 1;
}
message RemoveWeeklyScheduleResponse {
   bool success = 1;
  string message = 2;
}
// تولید تایم‌اسلات بر اساس برنامه هفتگی | Generate timeslots from weekly schedule
message GenerateTimeSlotsRequest {
  repeated TimeSlot timeslot = 1; // شناسه برنامه هفتگی | Weekly schedule ID
}
message GenerateTimeSlotsResponse {
   bool success = 1;
  string message = 2;
}
message RemoveTimeSlotsRequest {
  repeated TimeSlot timeslot = 1; // شناسه برنامه هفتگی | Weekly schedule ID
}
message RemoveTimeSlotsResponse {
   bool success = 1;
  string message = 2;
}
message TimeSlotsFilter {
  string id = 1;
  string provider_user_id = 2;
  string facility_id = 3;
  optional string employer_id = 4;
  optional string weekly_schedule_id = 5;

  // وضعیت‌ها
  OwnerType owner_type = 6;   // فردی یا اشتراکی
  bool is_reserved = 7;       // آیا رزرو شده یا نه
  Status status = 8;          // فعال/غیرفعال (مثلاً کنسل یا غیرفعال شده)
  WeekDay day = 9;            // روز هفته
  // فیلتر زمانی
  google.protobuf.Timestamp start_time = 10;        // شروع بازه
  google.protobuf.Timestamp end_time = 12;          // پایان بازه
  google.protobuf.Timestamp start_time_after = 13;  // شروع بزرگتر از
  google.protobuf.Timestamp end_time_before = 14;   // پایان کوچکتر از
}



message GetTimeSlotsListRequest {
TimeSlotsFilter filter=1;
}
message GetTimeSlotsListResponse {
  repeated TimeSlot stimeslots = 1;
}
message UpdateTimeSlotRequest {
  string id = 1;
  string provider_user_id = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
  OwnerType owner_type = 5;            // فردی یا اشتراکی
  bool is_reserved = 6;                // آیا رزرو شده یا نه
  Status status = 7; // فعال/غیرفعال (مثلاً کنسل شده یا غیرفعال شده)
   int32 capacity = 8; // ظرفیت کل
  int32 reserved_count = 9; // تعداد رزروهای انجام شده
}
message UpdateTimeSlotResponse {
  TimeSlot tileslot = 1;
  string message=2;
}

// -------------------- Reservation Requests & Responses --------------------
// ایجاد رزرو جدید | Create a new reservation
message CreateReservationRequest {
   Reservation reservation = 1; 
}
message CreateReservationResponse {
  string reservationID = 1;             // رزرو ایجادشده
  string message=2;
}
// بروزرسانی رزرو | Update reservation (برای تأیید، لغو، تغییر وضعیت پرداخت و بروزرسانی سرویس‌ها)
message UpdateReservationRequest {
   Reservation reservation = 1; 
}

message UpdateReservationResponse {
  Reservation reservation = 1;             // رزرو بروزشده
  string message=2;
}

// فیلتر رزروها | Reservation filter options
message ReservationFilter {
  optional string id = 1;                     // شناسه رزرو | Reservation ID
  optional string user_id = 2;                // شناسه کاربر رزروکننده | User ID
  optional string provider_user_id = 3;       // شناسه سرویس‌دهنده | Provider user ID
  optional string owner_user_id = 4;          // شناسه سرویس‌دهنده | Owner user ID
  optional string linked_user_id = 5;         // شناسه کاربر ایجاد کننده رزرو |Linked user ID

  optional string facility_id = 6;            // شناسه مرکز | Facility ID
  optional ReservationStatus status = 7;      // وضعیت رزرو | Reservation status
  optional PaymentStatus payment_status = 8;  // وضعیت پرداخت | Payment status
  optional ReservationSource source = 9;      // منبع رزرو | Reservation source (آنلاین، حضوری و ...)
  optional google.protobuf.Timestamp start_date = 10; // فیلتر از تاریخ | From date
  optional google.protobuf.Timestamp end_date = 11;   // فیلتر تا تاریخ | To date
}

// دریافت لیست رزروها با فیلتر پویا | Get list of reservations with filters
message ListReservationsRequest {
  ReservationFilter filter = 1;            // فیلتر پویا
  Pagination pagination = 2; // Pagination options.
}

message ListReservationsResponse {
  repeated Reservation reservations = 1;   // لیست رزروها
  int32 total_pages = 2;                         // تعداد کل رکوردها
}


// حذف کامل رزرو | Permanently delete a reservation
message DeleteReservationRequest {
  string reservation_id = 1;               // شناسه رزرو
}

message DeleteReservationResponse {
  bool success = 1;                        // نتیجه عملیات
  string message=2;
}

// ========== DOT ==========
message ProviderServiceData {
  users.User user = 1;
  Facility facility = 2;
  repeated ProviderService services = 3;
  bool isStarred=4;
}

message ProviderTeam {
  ProviderServiceData employer = 1;
 repeated ProviderServiceData employees = 2;
}

message GetProviderServicesWithUsersResponse {
  repeated ProviderTeam items = 1;
}

message GetProviderServicesWithUsersRequest {
  users.UserFilter user_filter = 1;
  repeated ProviderServiceFilter service_filter = 2;
  users.Pagination pagination = 3;
}

// ========== Voice Process ==========
message ProcessAudioRequest {
  bytes audio = 1;           // محتوای فایل صوتی
  string content_type = 2;   // e.g. "audio/webm" یا "audio/wav"
  string lang_hint = 3;      // optional: "fa" | "ar" | "en"
}

message Filter {
  string key = 1;
  string value = 2;
}

message ProcessAudioResponse {
  string text = 1;               // متن استخراج‌شده
  repeated Filter filters = 2;   // فیلترهای استخراج‌شده (key/value)
 repeated ProviderTeam items = 3; //search result نتیجه جستجو 
}


// ========== SERVICE ==========

// سرویس رزرو | Reservation Service
service ReservationService {
  //facility related methods
    // ایجاد یک فسیلیتی جدید | Create a new facility
  rpc CreateFacility(CreateFacilityRequest) returns (CreateFacilityResponse);
    // ویرایش یم فسیلیتی| update a  facility
  rpc UpdateFacility(UpdateFacilityRequest) returns (UpdateFacilityResponse);
    // دریافت لیست مکان‌ها | List all facilities
  rpc ListFacilities(ListFacilitiesRequest) returns (ListFacilitiesResponse);
//Service related methods
    // ایجاد سرویس جدید برای یک فسیلیتی | Create a new service for a facility
 rpc CreateService (CreateServiceRequest) returns (CreateServiceResponse);
     // ویرایش سرویس  | Update a service for a facility
  rpc UpdateService (UpdateServiceRequest) returns (UpdateServiceResponse);
          // دریافت لیست سرویس‌های یک فسیلیتی | List services of a facility
  rpc ListServices (ListServicesRequest) returns (ListServicesResponse);
     //ُProvider Service  related methods
    // تخصیص یک سرویس به ارائه‌دهنده | Assign a service to a provider
  rpc AssignServiceToProvider(AssignServiceToProviderRequest) returns (AssignServiceToProviderResponse);
    // خذف یک سرویس از ارائه‌دهنده | Remove a service from a provider
  rpc RemoveServiceFromProvider(RemoveServiceFromProviderRequest) returns (RemoveServiceFromProviderResponse);
    //  دریافت لیست سرویس‌های یک ارائه‌دهنده| Get provider services 
  rpc GetProviderServicesList(GetProviderServicesListRequest) returns (GetProviderServicesListResponse);
   // ویرایش سرویس  | Update a service for a provider
  rpc UpdateProviderService (UpdateProviderServiceRequest) returns (UpdateProviderServiceResponse);
  //WeeklySchedule and TimeSlot releated methods 
   // ایجاد برنامه‌ زمانی هفتگی برای ارائه‌دهنده | Create weekly schedule for provider
  rpc CreateWeeklySchedule(CreateWeeklyScheduleRequest) returns (CreateWeeklyScheduleResponse);
  rpc  GetWeeklyScheduleList(GetWeeklyScheduleListRequest) returns (GetWeeklyScheduleListResponse);
  rpc  UpdateWeeklySchedule(UpdateWeeklyScheduleRequest)  returns (UpdateWeeklyScheduleResponse);
  rpc  RemoveWeeklySchedule(RemoveWeeklyScheduleRequest)  returns (RemoveWeeklyScheduleResponse);


    // تولید تایم‌اسلات‌ها بر اساس برنامه‌ هفتگی | Generate time slots from weekly schedule
  rpc GenerateTimeSlots(GenerateTimeSlotsRequest) returns (GenerateTimeSlotsResponse);
  rpc GetTimeSlotsList(GetTimeSlotsListRequest) returns (GetTimeSlotsListResponse);
  rpc UpdateTimeSlot(UpdateTimeSlotRequest) returns (UpdateTimeSlotResponse);
  rpc RemoveTimeSlots(RemoveTimeSlotsRequest) returns (RemoveTimeSlotsResponse);

  // 🔹  رزرو | Reservation     
  rpc CreateReservation(CreateReservationRequest) returns (CreateReservationResponse);
  rpc UpdateReservationStatus(UpdateReservationRequest) returns (UpdateReservationResponse);
  rpc ListReservations(ListReservationsRequest) returns (ListReservationsResponse);
   rpc RemoveReservation(DeleteReservationRequest) returns (DeleteReservationResponse);
  // 🔹  Customer      
  rpc CreateCustomer(CreateCustomerRequest) returns (CreateCustomerResponse);
  rpc UpdateCustomer(UpdateCustomerRequest) returns (UpdateCustomerResponse);
  rpc ListCustomer(ListCustomerRequest) returns (ListCustomerResponse);
 


  //DOT
  rpc GetProviderServicesWithUsers(GetProviderServicesWithUsersRequest) returns (GetProviderServicesWithUsersResponse);

   // پردازش یک فایل صوتی و برگرداندن متن و فیلترها
  // برای شروع ساده: درخواست تک با بایت‌های فایل (مناسب برای فایلی تا چندین مگ)
  rpc ProcessAudio (ProcessAudioRequest) returns (ProcessAudioResponse);




}


