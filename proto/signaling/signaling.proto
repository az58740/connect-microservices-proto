syntax = "proto3";

package signaling.v1;

option go_package = "github.com/az58740/connect-microservices-proto/golang/signaling;signaling";

enum SignalType {
  SIGNAL_TYPE_UNSPECIFIED = 0;
  SIGNAL_TYPE_OFFER = 1;
  SIGNAL_TYPE_ANSWER = 2;
  SIGNAL_TYPE_CANDIDATE = 3;
  SIGNAL_TYPE_LEAVE = 4;
  SIGNAL_TYPE_CHAT = 5;
  SIGNAL_USER_JOINED = 6;
  
  // انواع جدید برای سناریوی مشاوره
  SIGNAL_TYPE_REQUEST_JOIN = 7;   // درخواست ورود به اتاق
  SIGNAL_TYPE_APPROVE_JOIN = 8;    // تایید درخواست
  SIGNAL_TYPE_REJECT_JOIN = 9;     // رد درخواست
  SIGNAL_TYPE_OWNER_LEFT = 10;      // صاحب روم خارج شد
  SIGNAL_TYPE_ROOM_INFO = 11;       // اطلاعات اتاق
  SIGNAL_TYPE_PENDING_USERS = 12;   // لیست کاربران منتظر
}

// نوع اتاق
enum RoomType {
  ROOM_TYPE_UNSPECIFIED = 0;
  ROOM_TYPE_CONSULTATION = 1;  // اتاق مشاوره (یک صاحب، چند شرکت‌کننده)
  ROOM_TYPE_PEER = 2;           // اتاق همتا به همتا (دوطرفه)
}

// نقش کاربر در اتاق
enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_OWNER = 1;        // صاحب روم (دکتر)
  USER_ROLE_PARTICIPANT = 2;  // شرکت‌کننده تایید شده
  USER_ROLE_PENDING = 3;       // در انتظار تایید
}

service SignalingService {
  rpc JoinRoom(JoinRoomRequest) returns (stream SignalMessage);
  rpc SendSignal(SignalMessage) returns (Empty);
  rpc LeaveRoom(LeaveRoomRequest) returns (Empty);
  rpc GetRoomInfo(GetRoomInfoRequest) returns (RoomInfo); // دریافت اطلاعات اتاق
}

message JoinRoomRequest {
  string room_id = 1;
  string user_id = 2;
  string user_name = 3;
  bool is_owner = 4;  // true اگر صاحب روم است (دکتر)
}

message SignalMessage {
  string room_id = 1;
  string from_user = 2;
  string from_user_name = 3;
  string to_user = 4;
  string to_user_name = 5;
  SignalType type = 6;
  string payload = 7; // اطلاعات اضافی به صورت JSON
  string message = 8; // متن چت یا اعلان
}

message LeaveRoomRequest {
  string room_id = 1;
  string user_id = 2;
}

// اطلاعات یک کاربر
message UserInfo {
  string user_id = 1;
  string user_name = 2;
  UserRole role = 3;
  string joined_at = 4; // ISO timestamp
}

// اطلاعات کامل اتاق
message RoomInfo {
  string room_id = 1;
  RoomType room_type = 2;
  string owner_id = 3;
  string owner_name = 4;
  repeated UserInfo users = 5;        // کاربران حاضر (تایید شده)
  repeated UserInfo pending_users = 6; // کاربران در انتظار تایید
  int32 max_participants = 7;          // حداکثر شرکت‌کننده (مثلاً 3 نفر)
  string created_at = 8;                // زمان ایجاد اتاق
}

message GetRoomInfoRequest {
  string room_id = 1;
  string user_id = 2;
}

message Empty {}